<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barrio-Uno-Jugadores</title>
  <link rel="stylesheet" href="jugadores.css">
</head>
<body>
        <header>
          <h1>Álbum Virtual - Mundial 2026</h1>
          <p>Colecciona los cromos de tus jugadores favoritos</p>
          <div id="contador-progreso"></div>
        </header>

        <!--Cambios realizados por el estudiante E-->
        <div id="barra-filtros" style="text-align: center; margin: 20px 0; padding: 10px; background: #f9f9f9; border-radius: 8px;">
            <input type="text" id="buscador-nombre" placeholder="Buscar jugador por nombre..." 
            style="padding: 8px; width: 250px; margin-right: 15px; border-radius: 4px; border: 1px solid #ccc;">
            
            <select id="filtro-pais" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                  <option value="todos">Todos los países</option>
                  <option value="Suiza">Suiza</option>
                  <option value="Canadá">Canadá</option>
                  <option value="Bosnia-Herzegovina">Bosnia-Herzegovina</option>
                  <option value="México">México</option>
                  <option value="Corea del Sur">Corea del Sur</option>
                  <option value="Qatar">Qatar</option>
                  <option value="Brasil">Brasil</option>
                  <option value="Marruecos">Marruecos</option>
                  <option value="Escocia">Escocia</option>
                  <option value="Estados Unidos">Estados Unidos</option>
                  <option value="Türkiye">Türkiye</option>
                  <option value="Paraguay">Paraguay</option>
            </select>
        </div>
        <!--Fin: estudiante E-->

        
        
        <div id="album">
          <!-- Las tarjetas .card-cromo se generan dinámicamente en jugadores.js -->
        </div>

        <div id="goles-totales"> 
          <!-- aqui van los goles -->
        </div>

  <script src="jugadores.js"></script>
</body>
</html>
